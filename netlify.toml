[build]
  base = "."
  command = "npm install"
  publish = "apps/api/public"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/trpc/*"
  to = "/.netlify/functions/trpc/:splat"
  status = 200

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/trpc/health"
  status = 200
